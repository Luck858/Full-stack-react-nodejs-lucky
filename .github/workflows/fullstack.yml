name: DevOps CI/CD Pipeline

on:
  push:
    branches: ["main"]

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/frontend

jobs:

# =========================
# 🔹 CI - BUILD & PUSH
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Docker Login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏷️ Generate Image Tag (commit SHA)
      - name: Set Image Tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🐳 Build Backend
      - name: Build Backend Image
        run: |
          docker build -t $BACKEND_IMAGE:$TAG ./backend
          docker tag $BACKEND_IMAGE:$TAG $BACKEND_IMAGE:latest

      # 🐳 Build Frontend
      - name: Build Frontend Image
        run: |
          docker build -t $FRONTEND_IMAGE:$TAG ./frontend
          docker tag $FRONTEND_IMAGE:$TAG $FRONTEND_IMAGE:latest

      # 🔍 Security Scan (Trivy)
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: $BACKEND_IMAGE:$TAG
          severity: CRITICAL,HIGH

      # 📤 Push Images
      - name: Push Images
        run: |
          docker push $BACKEND_IMAGE:$TAG
          docker push $BACKEND_IMAGE:latest
          docker push $FRONTEND_IMAGE:$TAG
          docker push $FRONTEND_IMAGE:latest

# =========================
# 🔹 CD - INFRA + DEPLOY
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ⚙️ Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -input=false \
            -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # ☸️ Set AKS Context (BEST PRACTICE)
      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.RG_NAME }}
          cluster-name: ${{ vars.AKS_NAME }}

      # 🏷️ Use same tag
      - name: Set Image Tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # 🚀 Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml

          # Replace image dynamically
          sed -i "s|backend:latest|$BACKEND_IMAGE:$TAG|g" k8s/backend-deployment.yaml
          sed -i "s|frontend:latest|$FRONTEND_IMAGE:$TAG|g" k8s/frontend-deployment.yaml

          kubectl apply -f k8s/

      # 🔄 Verify rollout
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend
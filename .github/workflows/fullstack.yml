  deploy:
    runs-on: ubuntu-latest
   # needs: [build, terraform]
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${{ needs.build.outputs.tag }}" >> $GITHUB_ENV

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group myRG --name myAKSCluster --overwrite-existing

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Substitute image tags in manifests
        run: |
          sed -i "s|DOCKER_USERNAME/backend:latest|$BACKEND_IMAGE:$TAG|g"  k8s/backend-deployment.yaml
          sed -i "s|DOCKER_USERNAME/frontend:latest|$FRONTEND_IMAGE:$TAG|g" k8s/frontend-deployment.yaml
          sed -i "s|DOCKER_USERNAME/postgres:latest|$POSTGRES_IMAGE:$TAG|g" k8s/postgres-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres-configmap.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/postgres  -n devops-app --timeout=120s
          kubectl rollout status deployment/backend   -n devops-app --timeout=120s
          kubectl rollout status deployment/frontend  -n devops-app --timeout=120s

      - name: Verify pods
        run: kubectl get pods -n devops-app

      - name: Verify services
        run: kubectl get svc -n devops-app

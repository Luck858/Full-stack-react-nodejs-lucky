image: atlassian/default-image:4

definitions:
  steps:
    - step: &build-push
        name: Build & Push Docker Images
        services:
          - docker
        script:
          - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          - docker build -t $DOCKER_USERNAME/backend:$BITBUCKET_COMMIT  ./backend
          - docker build -t $DOCKER_USERNAME/frontend:$BITBUCKET_COMMIT ./frontend
          - docker tag $DOCKER_USERNAME/backend:$BITBUCKET_COMMIT  $DOCKER_USERNAME/backend:latest
          - docker tag $DOCKER_USERNAME/frontend:$BITBUCKET_COMMIT $DOCKER_USERNAME/frontend:latest
          - docker push $DOCKER_USERNAME/backend:$BITBUCKET_COMMIT
          - docker push $DOCKER_USERNAME/backend:latest
          - docker push $DOCKER_USERNAME/frontend:$BITBUCKET_COMMIT
          - docker push $DOCKER_USERNAME/frontend:latest

    - step: &terraform-apply
        name: Terraform — Provision Azure Infrastructure
        image: hashicorp/terraform:1.7.0
        script:
          - cd terraform
          - terraform init
          - terraform validate
          - terraform import azurerm_resource_group.rg /subscriptions/e4b34d00-2343-42f6-a320-fa940a29c8e8/resourceGroups/devops-rg || true
          - terraform plan -input=false -out=tfplan
          - terraform apply -auto-approve tfplan
        after-script:
          - rm -f terraform/tfplan

    - step: &deploy-k8s
        name: Deploy to Kubernetes (AKS)
        image: mcr.microsoft.com/azure-cli:2.59.0
        script:
          # Install kubectl
          - az aks install-cli

          # Authenticate to Azure and get AKS credentials
          - az login --service-principal -u $AZURE_CLIENT_ID -p $AZURE_CLIENT_SECRET --tenant $AZURE_TENANT_ID
          - az aks get-credentials --resource-group $AKS_RESOURCE_GROUP --name $AKS_CLUSTER_NAME --overwrite-existing

          # Substitute image tag in deployments
          - sed -i "s|DOCKER_USERNAME/backend:latest|$DOCKER_USERNAME/backend:$BITBUCKET_COMMIT|g"  k8s/backend-deployment.yaml
          - sed -i "s|DOCKER_USERNAME/frontend:latest|$DOCKER_USERNAME/frontend:$BITBUCKET_COMMIT|g" k8s/frontend-deployment.yaml

          # Apply manifests in dependency order
          - kubectl apply -f k8s/namespace.yaml
          - kubectl apply -f k8s/postgres-configmap.yaml
          - kubectl apply -f k8s/postgres-pvc.yaml
          - kubectl apply -f k8s/postgres-deployment.yaml
          - kubectl apply -f k8s/postgres-service.yaml
          - kubectl apply -f k8s/backend-deployment.yaml
          - kubectl apply -f k8s/backend-service.yaml
          - kubectl apply -f k8s/frontend-deployment.yaml
          - kubectl apply -f k8s/frontend-service.yaml
          - kubectl apply -f k8s/ingress.yaml

          # Wait for rolling updates with health checks
          - kubectl rollout status deployment/backend  -n devops-app --timeout=120s
          - kubectl rollout status deployment/frontend -n devops-app --timeout=120s

          # Final status
          - kubectl get pods -n devops-app

pipelines:
  branches:
    main:
      - step: *build-push
      - step: *terraform-apply
      - step: *deploy-k8s
